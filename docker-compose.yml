services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stockapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-stockapp}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (message broker for real-time pipeline) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockapp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Batch Pipeline (APScheduler) ─────────────────────────────────────────────
  pipeline:
    build: .
    container_name: stockapp_pipeline
    restart: unless-stopped
    command: python main.py schedule
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  # ── Real-time: MQTT Subscriber ───────────────────────────────────────────────
  realtime-subscriber:
    build: .
    container_name: stockapp_rt_subscriber
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    command: python -m realtime.subscriber
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Real-time: Stream Processor ──────────────────────────────────────────────
  realtime-processor:
    build: .
    container_name: stockapp_rt_processor
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    command: python -m realtime.processor
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

volumes:
  postgres_data:
  redis_data:
